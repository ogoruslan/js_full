<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="output.css" />
    <title>Numbers</title>
  </head>
  <body>
    <main
      class="bg-[url(./images/bg-image.png)] bg-[rgb(0,0,0,0.7)] bg-blend-multiply"
    >
      <div class="container mx-auto">
        <div
          class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-[84px] auto-cols-[minmax(300px,300px)]"
        >
          <div class="text-center py-[60px]">
            <h1
              class="font-montserrat font-black text-[48px] leading-[72px] text-white pb-[17px]"
            >
              120 хв
            </h1>
            <p
              class="font-oswald font-bold text-[24px] leading-[32px] text-white pb-[20px]"
            >
              Тривалість консультации
            </p>
            <p
              class="font-montserrat font-medium text-[16px] leading-[24px] text-white"
            >
              Оптимально для того, щоб знайти вихід та зробити черговий крок
            </p>
          </div>
          <div class="text-center py-[60px]">
            <h1
              class="font-montserrat font-black text-[48px] leading-[72px] text-white pb-[17px]"
            >
              від 500 грн
            </h1>
            <p
              class="font-oswald font-bold text-[24px] leading-[32px] text-white pb-[20px]"
            >
              Вартість
            </p>
            <p
              class="font-montserrat font-medium text-[16px] leading-[24px] text-white"
            >
              Ціна доступна для будь-якої людини, яка потребує допомоги
            </p>
          </div>
          <div class="text-center py-[60px]">
            <h1
              class="font-montserrat font-black text-[48px] leading-[72px] text-white pb-[17px]"
            >
              250+
            </h1>
            <p
              class="font-oswald font-bold text-[24px] leading-[32px] text-white pb-[20px]"
            >
              Задоволених клієнтів
            </p>
            <p
              class="font-montserrat font-medium text-[16px] leading-[24px] text-white"
            >
              Результат — улыбка на лице и ощущение счастья
            </p>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
