<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
    <title>Movie search</title>
</head>

<body>
    <header>
        <h1>Movie Search</h1>
        <h2>Database of millions of movies. Just type the title.</h2>
        <div class="search-container">
            <input class="input" id="search-input" type="text" placeholder="Search for a movie..."
                onkeyup="makeGetRequest()">
            <svg viewBox="0 0 24 24" class="search__icon" onclick="makeGetRequest()">
                <g>
                    <path
                        d="M21.53 20.47l-3.66-3.66C19.195 15.24 20 13.214 20 11c0-4.97-4.03-9-9-9s-9 4.03-9 9 4.03 9 9 9c2.215 0 4.24-.804 5.808-2.13l3.66 3.66c.147.146.34.22.53.22s.385-.073.53-.22c.295-.293.295-.767.002-1.06zM3.5 11c0-4.135 3.365-7.5 7.5-7.5s7.5 3.365 7.5 7.5-3.365 7.5-7.5 7.5-7.5-3.365-7.5-7.5z">
                    </path>
                </g>
            </svg>
        </div>
    </header>
    <main>
        <div id="search-results">
            <p id="error-text"></p>
            <div class="search-result">
                <div id="movie-poster">
                    <img id="poster" alt="A movie poster.">
                </div>
                <div id="movie-info">
                    <div>
                        <h2 id="title"></h2>
                    </div>
                    <div>
                        <h3 class="field-name">Year: </h3>
                        <p id="year"></p>
                    </div>
                    <div>
                        <h3 class="field-name">Genre: </h3>
                        <p id="genre"></p>
                    </div>
                    <div>
                        <h3 class="field-name">Country: </h3>
                        <p id="country"></p>
                    </div>
                    <div>
                        <h3 class="field-name">IMDB Rating: </h3>
                        <p id="raiting"></p>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer>
        <p>
            © 1990-2026 by MovieSearch.com, Inc.
        </p>
    </footer>

</body>

</html>
