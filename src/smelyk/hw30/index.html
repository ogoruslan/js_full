<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="slyel.css">
    <script src="./main.js" defer></script>
    <title>Verifier</title>
</head>

<body>
    <div>
        <h1>Verifier Tool</h1>
        <form>
            <fieldset>
                <legend>Verify: </legend>
                <div class="input">
                    <label for="email">Email: </label>
                    <input type="email" id="email" oninput="restoreUi()">
                    <button type="button" onclick="isValidEmail()">Verfiy Email</button>
                </div>

                <div class="input">
                    <label for="url">URL: </label>
                    <input type="text" id="url" oninput="restoreUi()">
                    <button type="button" onclick="isValidUrl()">Verfiy URL</button>
                </div>
            </fieldset>
        </form>
    </div>
</body>

</html>
