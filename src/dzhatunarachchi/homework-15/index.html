<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Пізній сеанс — живий пошук фільмів</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="lobby">
      <header class="marquee">
        <p class="marquee__eyebrow">Каса відкрита · OMDb</p>
        <h1 class="marquee__title">Пізній сеанс</h1>
        <p class="marquee__sub">Почніть вводити назву — квитки друкуються в реальному часі</p>
      </header>

      <div class="search-window">
        <svg class="search-window__icon" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="11" cy="11" r="6.5" stroke="currentColor" stroke-width="2" fill="none" />
          <line x1="16" y1="16" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
        </svg>
        <input
          id="searchInput"
          class="search-window__input"
          type="text"
          placeholder="Назва фільму, серіалу…"
          autocomplete="off"
          aria-label="Пошук фільмів"
        />
        <div class="search-window__spinner" id="spinner" hidden aria-hidden="true"></div>
      </div>

      <main id="resultsArea" class="results">
        <p class="hint" id="hintState">Напишіть щось у полі вище — наприклад, «matrix» або «dune».</p>
      </main>

      <footer class="credit">
        Дані про фільми надані <a href="https://www.omdbapi.com/" target="_blank" rel="noopener">OMDb API</a>
      </footer>
    </div>

    <script src="app.js"></script>
  </body>
</html>
