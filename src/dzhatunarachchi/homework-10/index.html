<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Слайдер з котиками</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f2efe9;
        font-family: sans-serif;
      }
      .slider {
        width: 360px;
        background: #fff;
        border-radius: 16px;
        padding: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
        user-select: none;
      }
      .viewport {
        overflow: hidden;
        border-radius: 10px;
      }
      .track {
        display: flex;
        transition: transform 0.4s ease;
      }
      .track.no-anim {
        transition: none;
      }
      .slide {
        flex: 0 0 100%;
      }
      .slide img {
        width: 100%;
        height: 260px;
        object-fit: cover;
        display: block;
        pointer-events: none;
      }
      .controls {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 12px;
      }
      button {
        border: none;
        background: #eee;
        border-radius: 50%;
        width: 36px;
        height: 36px;
        font-size: 16px;
        cursor: pointer;
      }
      button:hover {
        background: #ddd;
      }
      .play {
        width: auto;
        border-radius: 18px;
        padding: 0 14px;
      }
      .dots {
        display: flex;
        gap: 6px;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #ccc;
        border: none;
        padding: 0;
        cursor: pointer;
      }
      .dot.active {
        background: #333;
      }
    </style>
  </head>
  <body>
    <div class="slider" id="slider">
      <div class="viewport"><div class="track" id="track"></div></div>
      <div class="controls">
        <button id="prevBtn">‹</button>
        <div class="dots" id="dots"></div>
        <button class="play" id="playBtn">пауза</button>
        <button id="nextBtn">›</button>
      </div>
    </div>

    <script src="homework-10.js"></script>
  </body>
</html>
