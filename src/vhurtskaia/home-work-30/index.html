<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home Work 30</title>
</head>
<body>
  <h1>Home Work 30</h1>
  <section>
    <h2>Перевірка Email</h2>
    <form id="emailForm">
      <input
          type="text"
          id="emailInput"
          placeholder="Введіть email"
      >
      <button type="submit">Перевірити</button>
    </form>
    <p id="emailResult"></p>
  </section>
  <hr>
  <section>
    <h2>Перевірка URL</h2>
    <form id="urlForm">
      <input
          type="text"
          id="urlInput"
          placeholder="Введіть URL"
      >
      <button type="submit">Перевірити</button>
    </form>
    <p id="urlResult"></p>
  </section>
  <script src="./main.js"></script>
</body>
</html>
