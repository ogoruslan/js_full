<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home Work 23</title>
</head>
<body>
  <h1>Home Work 23</h1>
  <hr>
  <h2>CalorieCalculator</h2>
  <input
      id="productName"
      type="text"
      placeholder="Назва продукту"
  />
  <input
      id="calories"
      type="number"
      placeholder="Калорії"
  />
  <button id="addProduct">
    Додати продукт
  </button>
  <button id="getCalories">
    Отримати калорії
  </button>
  <button id="removeProduct">
    Видалити продукт
  </button>
  <p id="calorieResult"></p>
  <hr>
  <h2>UniqueUsernames</h2>
  <input
      id="username"
      type="text"
      placeholder="Ім'я користувача"
  />
  <button id="addUser">
    Додати
  </button>
  <button id="checkUser">
    Перевірити
  </button>
  <button id="countUsers">
    Кількість
  </button>
  <p id="userResult"></p>
  <script type="module" src="js/main.js"></script>
</body>
</html>
