<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Таблиця Мондріана</title>
    <style>
      body {
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background-color: #f8f8f8;
      }

      .mondrian-table {
        width: 600px;
        height: 600px;
        border: 8px solid black;
        border-collapse: collapse;
        table-layout: fixed;
        background-color: white;
      }

      td {
        border: 8px solid black;
        padding: 0;
      }

      .inner-table {
        width: 100%;
        height: 100%;
        border-collapse: collapse;
        border: none;
      }
      /* В цьому блоці розібратись більш детально */
      .inner-table > tbody > tr:first-child > td,
      .inner-table > tr:first-child > td {
        border-top: none;
      }

      .inner-table > tbody > tr:last-child > td,
      .inner-table > tr:last-child > td {
        border-bottom: none;
      }

      .inner-table > tbody > tr > td:first-child,
      .inner-table > tr > td:first-child {
        border-left: none;
      }

      .inner-table > tbody > tr > td:last-child,
      .inner-table > tr > td:last-child {
        border-right: none;
      }

      /* Кольори */
      .red {
        background-color: #ff0000;
      }
      .yellow {
        background-color: #ffdb00;
      }
      .blue {
        background-color: #0d029d;
      }
      .black {
        background-color: #000000;
      }
    </style>
  </head>
  <body>
    <table class="mondrian-table">
      <!-- first section -->
      <tr>
        <td>
          <!--Перший суміжний блок(верхній блок)-->
          <table class="inner-table">
            <tr>
              <td style="width: 70.5%">
                <!--Таблиця в першому рядку-->
                <table class="inner-table">
                  <tr style="height: 15%">
                    <td>
                      <table class="inner-table">
                        <tr>
                          <td style="width: 35%"></td>
                          <td></td>
                        </tr>
                      </table>
                    </td>
                  </tr>
                  <tr>
                    <td>
                      <table class="inner-table">
                        <tr>
                          <td style="width: 14%">
                            <table class="inner-table">
                              <tr>
                                <td style="height: 35%"></td>
                              </tr>
                              <tr>
                                <td></td>
                              </tr>
                            </table>
                          </td>
                          <td>
                            <table class="inner-table">
                              <tr>
                                <td style="height: 80%" class="red"></td>
                              </tr>
                              <tr>
                                <td>
                                  <table class="inner-table">
                                    <tr>
                                      <td
                                        class="black"
                                        style="width: 49.5%"
                                      ></td>
                                      <td></td>
                                    </tr>
                                  </table>
                                </td>
                              </tr>
                            </table>
                          </td>
                        </tr>
                      </table>
                    </td>
                  </tr>
                </table>
              </td>
              <td>
                <!--Таблиця в другому рядку-->
                <table class="inner-table">
                  <tr style="height: 15%">
                    <td class="yellow"></td>
                  </tr>
                  <tr>
                    <td>
                      <!--Ще таблиця правий центр-->
                      <table class="inner-table">
                        <tr style="height: 35%">
                          <td class="yellow"></td>
                        </tr>
                        <tr style="height: 45%">
                          <td>
                            <table class="inner-table">
                              <tr>
                                <td></td>
                                <td></td>
                              </tr>
                            </table>
                          </td>
                        </tr>
                        <tr>
                          <td></td>
                        </tr>
                      </table>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
          </table>
        </td>
        <td style="width: 5%"></td>
      </tr>
      <!-- second section -->
      <tr style="height: 25%">
        <td>
          <!-- first part second section -->
          <table class="inner-table">
            <tr>
              <td class="yellow" style="width: 10%"></td>
              <!-- first group -->
              <td style="width: 30%">
                <table class="inner-table">
                  <tr class="black">
                    <td></td>
                  </tr>
                  <tr>
                    <td></td>
                  </tr>
                </table>
              </td>
              <!-- second group-->
              <td>
                <table class="inner-table">
                  <tr>
                    <td>
                      <table class="inner-table">
                        <tr style="height: 65%">
                          <td></td>
                        </tr>
                        <tr class="black">
                          <td></td>
                        </tr>
                      </table>
                    </td>
                    <td class="blue"></td>
                  </tr>
                  <tr>
                    <td colspan="2"></td>
                  </tr>
                </table>
              </td>
            </tr>
          </table>
        </td>
        <td class="red" style="width: 5%"></td>
      </tr>
    </table>
  </body>
</html>
